name: "test-local"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: npm ci
      - name: Testing / Linting
        run: npm run test
      - name: Package
        run: npm run package
      - uses: CatChen/check-git-status-action@cc5a79733c441f67cd0cd076de116cd2eebcebfe # v2.1.3
      - name: Check whether integrations tests should be enabled
        id: enable_integration_tests
        run: |
          echo 'value=${{ secrets.ZULIP_API_KEY != '' }}' >> "$GITHUB_OUTPUT"
      - name: Send a stream message
        uses: ./send-message
        with:
          email: "it-bot@github-actions-test.zulipchat.com"
          api-key: ${{ secrets.ZULIP_API_KEY }}
          organization-url: "https://github-actions-test.zulipchat.com"
          to: "test"
          type: "stream"
          topic: "github actions"
          content: "I come not, friends, to steal away your hearts."
        if: ${{ steps.enable_integration_tests.outputs.value == 'true' }}
      - name: Send a private message
        uses: ./send-message
        with:
          email: "it-bot@github-actions-test.zulipchat.com"
          api-key: ${{ secrets.ZULIP_API_KEY }}
          organization-url: "https://github-actions-test.zulipchat.com"
          to: "423060"
          type: "private"
          content: "With mirth and laughter let old wrinkles come."
        if: ${{ steps.enable_integration_tests.outputs.value == 'true' }}
  failure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: npm ci
      - name: Testing / Linting
        run: npm run test
      - name: Package
        run: npm run package
      - uses: CatChen/check-git-status-action@cc5a79733c441f67cd0cd076de116cd2eebcebfe # v2.1.3
      - name: Missing API key and password
        uses: ./send-message
        with:
          email: "it-bot@github-actions-test.zulipchat.com"
          organization-url: "https://github-actions-test.zulipchat.com"
          to: "test"
          type: "stream"
          topic: "github actions"
          content: "I come not, friends, to steal away your hearts."
        continue-on-error: true
      - name: Wrong organization URL
        uses: ./send-message
        with:
          email: "it-bot@github-actions-test.zulipchat.com"
          api-key: ${{ secrets.ZULIP_API_KEY }}
          organization-url: "https://org.zulipchat.com"
          to: "282093"
          type: "private"
          content: "With mirth and laughter let old wrinkles come."
        continue-on-error: true
